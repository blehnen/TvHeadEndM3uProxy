name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build image but skip push)'
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tvheadendm3uproxy

jobs:
  verify-gate:
    name: Verify Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag format (push only)
        if: github.event_name == 'push'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "Tag: ${TAG}"
          if ! echo "${TAG}" | grep -qP '^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Tag '${TAG}' does not match required format ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.-]+)?$"
            exit 1
          fi
          echo "Tag format OK: ${TAG}"

      - name: Validate tag matches csproj version (push only)
        if: github.event_name == 'push'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          PROP_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Source/TvHeadEndM3uProxy/TvHeadEndM3uProxy.csproj)
          echo "Tag version:    ${TAG_VERSION}"
          echo "csproj version: ${PROP_VERSION}"
          if [ "${TAG_VERSION}" != "${PROP_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}' does not match csproj version '${PROP_VERSION}'"
            exit 1
          fi
          echo "Version gate PASSED"

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: verify-gate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${EVENT_NAME}" = "push" ]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Source/TvHeadEndM3uProxy/TvHeadEndM3uProxy.csproj)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.dry_run == false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.dry_run == false }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Write summary
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | \`linux/amd64, linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          PUSHED="${{ github.event_name == 'push' || inputs.dry_run == false }}"
          echo "| Pushed | \`${PUSHED}\` |" >> "$GITHUB_STEP_SUMMARY"
