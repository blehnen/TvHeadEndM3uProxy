name: CI

on:
  push:
    branches:
      - master
      - docker_rewrite
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Source/TvHeadEndM3uProxy.sln

      - name: Build
        run: dotnet build Source/TvHeadEndM3uProxy.sln -c Release --no-restore

      - name: Test
        run: dotnet test Source/TvHeadEndM3uProxy.sln -c Release --no-build --logger "console;verbosity=normal"

  docker-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: tvheadendm3uproxy:ci-smoke
